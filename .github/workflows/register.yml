name: 4399 Auto Register

on:
  workflow_dispatch:
    inputs:
      count:
        description: '成功注册数量 (0=不限, 按 duration 停)'
        required: false
        default: '0'
      duration:
        description: '最大运行时长(秒), 0=无限(最长1.5小时)'
        required: false
        default: '5400'
      workers:
        description: '并发线程数'
        required: false
        default: '3'
      max_sfz_uses:
        description: '每个身份证最大使用次数'
        required: false
        default: '4'
      username_prefix:
        description: '用户名前缀 (留空=纯随机)'
        required: false
        default: ''
      username_len:
        description: '用户名总长度'
        required: false
        default: '7'
      password_len:
        description: '密码长度'
        required: false
        default: '10'
      use_custom_model:
        description: '使用自定义验证码模型 (true/false)'
        required: false
        default: 'false'
      onnx_use:
        description: '使用自定义onnx验证码模型 (true/false)'
        required: false
        default: 'true'
      use_proxy:
        description: '使用代理 (true/false)'
        required: false
        default: 'true'
      max_captcha_retry:
        description: '验证码最大重试次数'
        required: false
        default: '3'
      min_interval:
        description: '每轮最小间隔(秒)'
        required: false
        default: '1'
      max_interval:
        description: '每轮最大间隔(秒)'
        required: false
        default: '3'
      auto_login:
        description: '注册后自动登录获取sauth (true/false)'
        required: false
        default: 'true'
      proxy_list_urls:
        description: '代理列表地址(逗号分隔多个源)'
        required: false
        default: 'https://raw.githubusercontent.com/iplocate/free-proxy-list/main/protocols/http.txt,https://raw.githubusercontent.com/komutan234/Proxy-List-Free/main/proxies/http.txt,https://cdn.jsdelivr.net/gh/proxifly/free-proxy-list@main/proxies/protocols/http/data.txt,https://raw.githubusercontent.com/r00tee/Proxy-List/main/Https.txt'
      max_per_ip:
        description: '单IP最大注册数(超限自动换IP)'
        required: false
        default: '15'
      proxy_check_threads:
        description: '代理验证并发线程数'
        required: false
        default: '50'

  schedule:
    - cron: '0 */4 * * *'

jobs:
  register:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install onnxruntime
          pip install -r requirements.txt
          if [ "${{ github.event.inputs.use_custom_model || 'true' }}" = "true" ]; then
            pip install torch --index-url https://download.pytorch.org/whl/cpu
          fi

      - name: Restore data files from cache
        uses: actions/cache@v4
        with:
          path: |
            4399.txt
            used_sfz.txt
            sauth.json
          key: register-data-${{ github.ref }}
          restore-keys: |
            register-data-

      - name: Setup sfz.txt from secret
        env:
          SFZ_DATA: ${{ secrets.SFZ_DATA }}
        run: |
          if [ -n "$SFZ_DATA" ]; then
            echo "$SFZ_DATA" | base64 -d > sfz.txt
            echo "sfz.txt 已从 secret 恢复"
          else
            echo "未配置 SFZ_DATA secret, 使用仓库中的 sfz.txt"
          fi

      - name: Run register script
        env:
          WORKERS: ${{ github.event.inputs.workers || '3' }}
          MAX_SFZ_USES: ${{ github.event.inputs.max_sfz_uses || '4' }}
          USERNAME_PREFIX: ${{ github.event.inputs.username_prefix || '' }}
          USERNAME_LEN: ${{ github.event.inputs.username_len || '7' }}
          PASSWORD_LEN: ${{ github.event.inputs.password_len || '10' }}
          USE_CUSTOM_MODEL: ${{ github.event.inputs.use_custom_model || 'true' }}
          ONNX_USE: ${{ github.event.inputs.onnx_use || 'true' }}
          USE_PROXY: ${{ github.event.inputs.use_proxy || 'true' }}
          MAX_CAPTCHA_RETRY: ${{ github.event.inputs.max_captcha_retry || '3' }}
          MIN_INTERVAL: ${{ github.event.inputs.min_interval || '1' }}
          MAX_INTERVAL: ${{ github.event.inputs.max_interval || '3' }}
          AUTO_LOGIN: ${{ github.event.inputs.auto_login || 'true' }}
          PROXY_LIST_URLS: ${{ github.event.inputs.proxy_list_urls || 'https://raw.githubusercontent.com/iplocate/free-proxy-list/main/protocols/http.txt,https://raw.githubusercontent.com/komutan234/Proxy-List-Free/main/proxies/http.txt,https://cdn.jsdelivr.net/gh/proxifly/free-proxy-list@main/proxies/protocols/http/data.txt,https://raw.githubusercontent.com/r00tee/Proxy-List/main/Https.txt' }}
          MAX_PER_IP: ${{ github.event.inputs.max_per_ip || '15' }}
          PROXY_CHECK_THREADS: ${{ github.event.inputs.proxy_check_threads || '50' }}
        run: |
          COUNT="${{ github.event.inputs.count || '0' }}"
          DURATION="${{ github.event.inputs.duration || '5400' }}"
          python auto_register_4399.py --count "$COUNT" --duration "$DURATION"
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: register-results-${{ github.run_number }}
          path: |
            4399.txt
            used_sfz.txt
            sauth.json
            register.log
          retention-days: 30
